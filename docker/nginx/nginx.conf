events {
    worker_connections 1024;
}

http {
    # ── Upstream services (internal Docker network addresses) ──────────────────
    upstream api_service {
        server api:8000;
    }

    upstream frontend_service {
        server frontend:8501;
    }

    upstream grafana_service {
        server grafana:3000;
    }

    upstream flower_service {
        server flower:5555;
    }

    # ── Main server block ──────────────────────────────────────────────────────
    server {
        listen 80;

        # Health check (used by Docker and load balancers)
        location /health {
            proxy_pass http://api_service/health;
            proxy_set_header Host $host;
        }

        # GitHub webhook endpoint (Phase 2)
        location /webhook {
            proxy_pass http://api_service/webhook;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # FastAPI REST API + Swagger docs
        location /api/ {
            proxy_pass http://api_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Grafana monitoring dashboard
        location /grafana/ {
            proxy_pass http://grafana_service/;
            proxy_set_header Host $host;
        }

        # Flower Celery task monitor
        location /flower/ {
            proxy_pass http://flower_service/;
            proxy_set_header Host $host;
        }

        # Streamlit frontend — catch all remaining routes
        # WebSocket upgrade needed for Streamlit live updates
        location / {
            proxy_pass http://frontend_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
            proxy_read_timeout 86400s;  # long timeout for Streamlit WebSocket
        }
    }
}
