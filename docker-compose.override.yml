# Local development overrides
# This file is ONLY used locally — never in production
# Run with: docker compose -f docker-compose.yml -f docker-compose.override.yml up
#
# What this does differently from production:
#   - api runs with --reload (hot reload on code change)
#   - app code is mounted as volume (no rebuild needed)
#   - internal service ports opened to host for direct access

services:

  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app        # live code sync — save file → api reloads instantly
      - ./prompts:/app/prompts
    ports:
      - "8000:8000"           # direct access without going through nginx

  worker:
    volumes:
      - ./app:/app/app        # live code sync for worker too
    environment:
      CELERY_WORKER_LOGLEVEL: DEBUG

  # Open internal ports to host for developer tools
  postgres:
    ports:
      - "5432:5432"           # DBeaver / pgAdmin / psql direct access

  redis:
    ports:
      - "6379:6379"           # Redis CLI / RedisInsight direct access

  qdrant:
    ports:
      - "6333:6333"           # Qdrant Web UI at http://localhost:6333/dashboard

  flower:
    ports:
      - "5555:5555"           # Celery task monitor at http://localhost:5555

  prometheus:
    ports:
      - "9090:9090"           # Prometheus UI at http://localhost:9090

  grafana:
    ports:
      - "3000:3000"           # Grafana UI at http://localhost:3000
